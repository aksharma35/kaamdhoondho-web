<footer class="bg-[#0a4742] px-6 sm:px-10 py-16 text-center text-white">
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-8 max-w-4xl mx-auto">
    <div>
      <p class="text-[#ffd166] font-extrabold text-4xl">50,000+</p>
      <p class="mt-2">{{ 'footer.workers' | translate }}</p>
    </div>
    <div>
      <p class="text-[#ffd166] font-extrabold text-4xl">10,000+</p>
      <p class="mt-2">{{ 'footer.businesses' | translate }}</p>
    </div>
    <div>
      <p class="text-[#ffd166] font-extrabold text-4xl">100+</p>
      <p class="mt-2">{{ 'footer.cities' | translate }}</p>
    </div>
  </div>

  <div class="border-t border-[#1b6f69] max-w-5xl mx-auto mt-12 pt-8">
    <p class="max-w-3xl mx-auto">{{ 'footer.quote' | translate }}</p>
    <p class="text-[#b9d9d5] text-sm mt-2">{{ 'footer.quoteBy' | translate }}</p>

    <div class="flex justify-center gap-4 mt-8">
      <button type="button" class="bg-white text-[#0a4742] font-semibold rounded-lg px-6 py-3">
        Google Play
      </button>
      <button type="button" class="bg-white text-[#0a4742] font-semibold rounded-lg px-6 py-3">
        App Store
      </button>
    </div>
  </div>

  <div class="flex flex-col sm:flex-row items-center justify-between gap-4 max-w-5xl mx-auto mt-12 text-sm text-[#b9d9d5]">
    <button type="button" (click)="lang.toggle()" class="bg-[#0f5c56] text-white rounded-full px-5 py-2">
      <span [class.font-bold]="lang.current() === 'en'">EN</span>
      &nbsp;|&nbsp;
      <span [class.font-bold]="lang.current() === 'hi'">HI</span>
    </button>
    <p>Facebook · Instagram · YouTube</p>
    <p>{{ 'footer.copyright' | translate }}</p>
  </div>
</footer>

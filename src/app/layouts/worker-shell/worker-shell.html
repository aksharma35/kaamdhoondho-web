<div class="min-h-screen bg-[#fffbf2] lg:flex">
  <!-- Sidebar (lg+) -->
  <aside class="hidden lg:flex flex-col w-64 shrink-0 bg-white border-r border-[#d8e8e6] sticky top-0 h-screen p-6">
    <a routerLink="/" class="flex items-center gap-3">
      <span class="text-3xl">🛠️</span>
      <div>
        <p class="font-bold text-xl text-[#0f5c56] leading-none">Kaamdhoondo</p>
        <p class="text-sm text-[#6b8280] leading-none mt-1">कामढूंढो</p>
      </div>
    </a>
    <nav class="mt-10 flex flex-col gap-1">
      @for (tab of tabs; track tab.path) {
        <a
          [routerLink]="tab.path"
          routerLinkActive="bg-[#e3f3f1] text-[#0f5c56] font-semibold"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-3 rounded-xl px-4 py-3 text-[#6b8280] transition hover:bg-[#f1f5f4]"
        >
          <span class="text-xl leading-none">{{ tab.icon }}</span>
          <span>{{ tab.label | translate }}</span>
        </a>
      }
    </nav>
    <div class="flex-1"></div>
    <button
      type="button"
      (click)="logout()"
      class="flex items-center gap-3 rounded-xl px-4 py-3 text-[#6b8280] text-left transition hover:bg-[#f1f5f4]"
    >
      <span class="text-xl leading-none">🚪</span>
      <span>{{ 'settingsPage.logout' | translate }}</span>
    </button>
  </aside>

  <!-- Content -->
  <div class="w-full max-w-md mx-auto pb-20 lg:mx-0 lg:max-w-5xl lg:px-6 lg:pb-10">
    <router-outlet />
  </div>

  <!-- Bottom tabs (mobile only) -->
  <nav class="fixed bottom-0 inset-x-0 bg-white border-t border-[#d8e8e6] lg:hidden">
    <div class="max-w-md mx-auto grid grid-cols-4">
      @for (tab of tabs; track tab.path) {
        <a
          [routerLink]="tab.path"
          routerLinkActive="text-[#0f5c56] font-semibold"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex flex-col items-center gap-1 py-2.5 text-[#6b8280] text-xs"
        >
          <span class="text-xl leading-none">{{ tab.icon }}</span>
          <span>{{ tab.label | translate }}</span>
        </a>
      }
    </div>
  </nav>
</div>
